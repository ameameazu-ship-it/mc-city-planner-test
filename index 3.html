<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MC City Planner</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;overflow:hidden;background:#020b18;-webkit-text-size-adjust:100%;touch-action:manipulation;}
:root{
  --gold:#f5c842;
  --gold-dim:#c8941a;
  --blue:#3b9eff;
  --blue-dark:#0a2a4a;
  --bg:#020b18;
  --surface:#071828;
  --surface2:#0c2236;
  --border:#1a4060;
  --text:#d4eaf7;
  --text-dim:#5a8aaa;
}
body{font-family:'Noto Sans JP',sans-serif;}

/* ===== APP ===== */
#app{display:flex;flex-direction:column;height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);background:var(--bg);overflow:hidden;touch-action:manipulation;}

/* ===== TOPBAR ===== */
#topbar{
  background:linear-gradient(180deg,#0d2035 0%,#071828 100%);
  border-bottom:2px solid var(--gold);
  flex-shrink:0;min-height:54px;
  overflow:hidden;
  position:relative;
  touch-action:manipulation;
}
#topbar-btns{
  display:flex;gap:6px;align-items:center;
  width:100%;height:54px;
  padding:8px 10px;box-sizing:border-box;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
  -ms-overflow-style:none;scrollbar-width:none;
}
#topbar-btns::-webkit-scrollbar{display:none;}
#topbar-btns::-webkit-scrollbar{display:none;}
#topbar::-webkit-scrollbar{display:none;}
#topbar::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,200,66,0.4),transparent);
}


.title{
  font-family:'Orbitron',sans-serif;
  color:var(--gold);font-size:12px;font-weight:900;
  letter-spacing:2px;white-space:nowrap;flex-shrink:0;
  text-shadow:0 0 12px rgba(245,200,66,0.6);
}

/* ===== TOOLBAR BUTTONS ===== */
.tb-btn{
  min-width:52px;min-height:44px;
  padding:0 10px;
  border:1.5px solid var(--border);
  border-radius:10px;
  background:linear-gradient(180deg,#0f2a42 0%,#071828 100%);
  color:var(--text);
  cursor:pointer;font-size:11px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(59,158,255,0.3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;white-space:nowrap;gap:3px;
  position:relative;overflow:hidden;
  transition:all 0.15s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
}
.tb-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  border-radius:9px;
}
.tb-btn:active{transform:scale(0.95);box-shadow:0 1px 4px rgba(0,0,0,0.6);}
.tb-btn.on{
  background:linear-gradient(180deg,#1a5a9a 0%,#0a3060 100%);
  border-color:var(--blue);color:#fff;
  box-shadow:0 0 12px rgba(59,158,255,0.3),0 2px 8px rgba(0,0,0,0.4);
}
.tb-btn:disabled{opacity:.3;pointer-events:none;}

/* ===== MAIN AREA ===== */
#main-area{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;}
#canvas-wrap{flex:1;overflow:auto;background:#030f1e;-webkit-overflow-scrolling:touch;position:relative;outline:none;transition:outline 0.1s;}
#gc,#ov{display:block;-webkit-user-select:none;user-select:none;}
#gc{touch-action:none;}
#gc{image-rendering:pixelated;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;}
#ov{position:absolute;top:0;left:0;pointer-events:none;image-rendering:pixelated;image-rendering:-webkit-optimize-contrast;}
#snap-flash{position:absolute;pointer-events:none;border:3px solid #60a5fa;border-radius:4px;opacity:0;z-index:5;transition:opacity 0.1s;}

/* ===== PARTS SHEET ===== */
#sheet-backdrop{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:20;backdrop-filter:blur(2px);}
#sheet{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(180deg,#0c2236 0%,#071828 100%);
  border-top:2px solid var(--gold);
  border-radius:18px 18px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(0.32,0.72,0,1);
  display:flex;flex-direction:column;max-height:65%;
  box-shadow:0 -4px 40px rgba(0,0,0,0.8);
}
#sheet::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,200,66,0.5),transparent);
}
#sheet.open{transform:translateY(0);}
#sheet-handle{width:44px;height:5px;background:var(--border);border-radius:3px;margin:10px auto 6px;flex-shrink:0;}
#sheet-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none;padding:0 8px;}
#sheet-tabs::-webkit-scrollbar{display:none;}
.s-tab{
  padding:10px 14px;font-size:12px;font-weight:700;
  color:var(--text-dim);cursor:pointer;white-space:nowrap;
  border:none;background:transparent;
  font-family:'Noto Sans JP',sans-serif;
  min-height:42px;flex-shrink:0;
  border-bottom:3px solid transparent;
  transition:color 0.15s,border-color 0.15s;
  letter-spacing:0.5px;
}
.s-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
#sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.block-grid{display:flex;flex-wrap:wrap;gap:7px;padding:10px;}
.block-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px 8px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:linear-gradient(180deg,#0f2a42 0%,#071828 100%);
  cursor:pointer;font-size:26px;
  width:calc(20% - 6px);min-width:62px;min-height:66px;
  justify-content:center;position:relative;
  transition:all 0.15s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.block-btn:active{transform:scale(0.93);}
.block-btn.selected{
  background:linear-gradient(180deg,#1a3a5a 0%,#0a2040 100%);
  border-color:var(--gold);
  box-shadow:0 0 14px rgba(245,200,66,0.25);
}
.block-btn.selected::after{
  content:'✓';position:absolute;top:3px;right:5px;
  font-size:9px;color:var(--gold);font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
}
.block-label{font-size:9px;color:var(--text-dim);text-align:center;line-height:1.2;font-weight:700;}

/* ===== BOTTOM BAR ===== */
#bottom-bar{
  display:flex;align-items:center;gap:6px;padding:8px 10px;
  background:linear-gradient(0deg,#0d2035 0%,#071828 100%);
  border-top:2px solid var(--gold);
  flex-shrink:0;min-height:68px;
  position:relative;
  touch-action:manipulation;
}
#bottom-bar::before{
  content:'';position:absolute;top:-2px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,200,66,0.4),transparent);
}

/* ツールボタン */
.bb-btn{
  min-width:54px;min-height:54px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:linear-gradient(180deg,#0f2a42 0%,#071828 100%);
  color:var(--text);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;flex:1;
  font-family:'Noto Sans JP',sans-serif;
  transition:all 0.15s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);
  position:relative;overflow:hidden;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(59,158,255,0.3);
}
.bb-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.05) 0%,transparent 50%);
}
.bb-btn:active{transform:scale(0.93);}
.bb-btn.active{
  background:linear-gradient(180deg,#1a5a9a 0%,#0a3060 100%);
  border-color:var(--blue);color:#fff;
  box-shadow:0 0 16px rgba(59,158,255,0.35);
}
.bb-lbl{font-size:9px;color:inherit;opacity:.75;font-weight:700;letter-spacing:0.3px;}

/* 選択プレビュー */
#sel-preview{
  min-width:58px;min-height:54px;
  border:2px solid var(--gold);
  border-radius:12px;
  background:linear-gradient(180deg,#1a3a18 0%,#0a1a08 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 0 14px rgba(245,200,66,0.2);
  transition:all 0.15s;
  padding:6px 4px;
  touch-action:manipulation;
}
#sel-preview:active{transform:scale(0.93);}

/* パーツボタン */
#parts-btn{
  min-width:58px;min-height:54px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:linear-gradient(180deg,#0f2a42 0%,#071828 100%);
  color:var(--text-dim);cursor:pointer;font-size:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  flex-shrink:0;font-family:'Noto Sans JP',sans-serif;
  transition:all 0.15s;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
  touch-action:manipulation;
}
#parts-btn.open-state{border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(245,200,66,0.2);}
#parts-btn:active{transform:scale(0.93);}
.parts-lbl{font-size:9px;font-weight:700;opacity:.75;}

/* ===== CONTEXT MENU ===== */
#ctx-menu{
  display:none;position:fixed;z-index:100;
  background:linear-gradient(180deg,#0c2236 0%,#071828 100%);
  border:2px solid var(--gold);border-radius:16px;
  padding:8px;min-width:170px;
  box-shadow:0 12px 48px rgba(0,0,0,0.8),0 0 0 1px rgba(245,200,66,0.1);
}
#ctx-menu.show{display:block;}
.ctx-title{font-size:10px;color:var(--text-dim);padding:2px 8px 8px;letter-spacing:1px;font-weight:700;}
.ctx-dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 4px 8px;}
.ctx-dir-btn{
  min-height:44px;border:1.5px solid var(--border);border-radius:10px;
  background:linear-gradient(180deg,#0f2a42 0%,#071828 100%);
  color:var(--text-dim);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
}
.ctx-dir-btn:active{transform:scale(0.9);}
.ctx-dir-btn.active-dir{background:linear-gradient(180deg,#1a5a9a 0%,#0a3060 100%);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(59,158,255,0.3);}
.ctx-dir-btn.center-btn{font-size:10px;color:var(--text-dim);font-weight:700;}
.ctx-sep{height:1px;background:var(--border);margin:2px 4px 8px;}
.ctx-action{width:100%;padding:10px 14px;border:none;border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text);cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;text-align:left;display:block;transition:background 0.12s;}
.ctx-action:active{background:rgba(255,255,255,0.1);}
.ctx-action.danger{color:#f87171;}
#ctx-close{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;font-weight:700;margin-top:5px;transition:all 0.12s;}
#ctx-close:active{background:rgba(255,255,255,0.05);}

/* ===== SETTINGS PANEL ===== */
#settings-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:200;
  backdrop-filter:blur(4px);
}
#settings-panel{
  display:none;position:fixed;
  touch-action:manipulation;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(180deg,#0c2236 0%,#071828 100%);
  border:2px solid var(--gold);
  border-radius:20px;padding:24px;z-index:201;
  min-width:280px;width:min(340px,90vw);
  max-height:85vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(245,200,66,0.1);
  -webkit-overflow-scrolling:touch;
}
.settings-title{
  font-family:'Orbitron',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--gold);text-align:center;
  letter-spacing:2px;margin-bottom:20px;
  text-shadow:0 0 12px rgba(245,200,66,0.5);
}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding:10px 12px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:12px;
}
.settings-row-label{font-size:13px;color:var(--text);font-weight:700;}
.settings-row-desc{font-size:10px;color:var(--text-dim);margin-top:3px;}
.toggle-btn{
  width:56px;height:30px;border-radius:15px;border:2px solid var(--border);
  cursor:pointer;font-size:11px;font-weight:700;
  background:var(--surface2);color:var(--text-dim);
  transition:all 0.2s ease;flex-shrink:0;
}
.toggle-btn.on{
  background:linear-gradient(135deg,#1a6aaa,#0a4080);
  border-color:var(--blue);color:#fff;
  box-shadow:0 0 12px rgba(59,158,255,0.4);
}
.settings-divider{height:1px;background:var(--border);margin:16px 0;}
.settings-action{
  width:100%;padding:13px;border-radius:12px;border:none;
  cursor:pointer;font-size:13px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  margin-bottom:10px;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.settings-action.primary{
  background:linear-gradient(135deg,#1a5a9a,#0a3060);
  color:#fff;border:1.5px solid var(--blue);
  box-shadow:0 4px 16px rgba(59,158,255,0.2);
}
.settings-action.primary:active{transform:scale(0.97);}
.settings-action.secondary{
  background:linear-gradient(135deg,#1a3a2a,#0a1a12);
  color:#6adf9a;border:1.5px solid #2a6a4a;
  box-shadow:0 4px 16px rgba(50,200,100,0.15);
}
.settings-action.secondary:active{transform:scale(0.97);}
.settings-action.danger{
  background:linear-gradient(135deg,#4a0a0a,#2a0505);
  color:#f87171;border:1.5px solid #7f1d1d;
  box-shadow:0 4px 16px rgba(239,68,68,0.15);
}
.settings-action.danger:active{transform:scale(0.97);}
.lang-btn{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
.lang-btn.active{background:linear-gradient(135deg,#1a5a9a,#0a3060);border-color:var(--blue);color:#fff;box-shadow:0 0 10px rgba(59,158,255,0.3);}
.lang-btn:active{transform:scale(0.93);}
.settings-close{
  width:100%;padding:10px;border-radius:12px;
  border:1.5px solid var(--border);
  background:transparent;color:var(--text-dim);
  cursor:pointer;font-size:12px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  margin-top:4px;transition:all 0.15s;
}
.settings-close:active{background:rgba(255,255,255,0.05);}



/* ---- フィールド保存/読み込みモーダル ---- */
#map-modal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.88);
  align-items:center;justify-content:center;
  padding:20px;box-sizing:border-box;
}
#map-modal.show{display:flex;}
#map-modal-box{
  background:linear-gradient(180deg,#0c2236 0%,#071828 100%);
  border:2px solid var(--gold);border-radius:20px;
  padding:20px;width:min(360px,100%);
  max-height:80vh;display:flex;flex-direction:column;gap:12px;
  box-shadow:0 24px 80px rgba(0,0,0,0.9);
  -webkit-overflow-scrolling:touch;
}
#map-modal-title{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:var(--gold);text-align:center;letter-spacing:2px;
}
#map-name-input{
  width:100%;padding:12px 14px;border-radius:12px;box-sizing:border-box;
  background:rgba(255,255,255,0.05);border:1.5px solid var(--border);
  color:#fff;font-size:16px;font-family:'Noto Sans JP',sans-serif;
  outline:none;
}
#map-name-input:focus{border-color:var(--gold);}
#map-slot-list{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
  max-height:40vh;
  touch-action:pan-y;
  -webkit-overflow-scrolling:touch;
}
.map-slot{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:12px;padding:10px 12px;cursor:pointer;
  transition:all 0.15s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(59,158,255,0.2);
}
.map-slot:active{background:rgba(59,158,255,0.15);}
.map-slot-info{flex:1;}
.map-slot-name{font-size:13px;color:var(--text);font-weight:700;}
.map-slot-date{font-size:10px;color:var(--text-dim);}
.map-slot-del{
  background:none;border:none;cursor:pointer;
  color:#f87171;font-size:16px;padding:4px 6px;
  border-radius:8px;flex-shrink:0;
  touch-action:manipulation;
}
.map-slot-del:active{background:rgba(248,113,113,0.15);}
.map-slot-empty{
  font-size:12px;color:var(--text-dim);text-align:center;
  padding:20px 0;
}
#map-modal-btns{display:flex;gap:10px;}
#map-modal-save-btn{
  flex:1;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1a5a9a,#0a3060);
  color:#fff;font-size:13px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  border:1.5px solid var(--blue);
}
#map-modal-cancel{
  padding:13px 18px;border-radius:12px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.05);border:1.5px solid var(--border);
  color:var(--text);font-size:13px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
}


/* ゴースト配置バー */
#ghost-bar{
  display:none;
  justify-content:center;align-items:center;gap:10px;
  padding:10px 16px;
  background:linear-gradient(135deg,#0c2236,#071828);
  border-top:2px solid var(--gold);
  border-bottom:none;
  white-space:nowrap;
  touch-action:manipulation;
  flex-shrink:0;
}
#ghost-bar .ghost-label{
  font-size:12px;color:var(--text-dim);font-weight:700;
}
#ghost-bar .ghost-size{
  font-size:14px;color:var(--gold);font-weight:700;font-family:'Orbitron',sans-serif;
}
#ghost-rotate{
  padding:6px 12px;border-radius:10px;border:1.5px solid var(--blue);
  background:rgba(59,158,255,0.15);color:#7ab8ff;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;
}
#ghost-confirm{
  padding:6px 14px;border-radius:10px;border:1.5px solid #22c55e;
  background:rgba(34,197,94,0.2);color:#4ade80;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;
}
#ghost-cancel-btn{
  padding:6px 12px;border-radius:10px;border:1.5px solid #7f1d1d;
  background:rgba(248,113,113,0.15);color:#f87171;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;
}

/* ===== AI CHAT PANEL ===== */
#ai-panel{
  display:none;position:fixed;
  bottom:0;left:0;right:0;
  z-index:250;
  background:linear-gradient(180deg,#071828 0%,#050f1a 100%);
  border-top:2px solid var(--gold);
  max-height:60vh;
  display:none;
  flex-direction:column;
}
#ai-panel.open{display:flex;}
#ai-panel-header{
  display:flex;align-items:center;padding:10px 14px;gap:8px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#ai-panel-title{
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  color:var(--gold);flex:1;letter-spacing:1px;
}
#ai-panel-close{
  background:none;border:none;color:var(--text-dim);font-size:18px;
  cursor:pointer;padding:2px 6px;touch-action:manipulation;
}
#ai-chat-log{

<script>
var app=(function(){


// ellipse polyfill for older Safari
if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.ellipse){
  CanvasRenderingContext2D.prototype.ellipse=function(x,y,rx,ry,rot,sA,eA,ccw){
    this.save();this.translate(x,y);this.rotate(rot);this.scale(rx,ry);
    this.arc(0,0,1,sA,eA,ccw);this.restore();
  };
}

var COLS=40,ROWS=30,CELL=57;
var showGrid=true,snapEnabled=true,soundEnabled=true,vibeEnabled=true;
var SCALE_OPTIONS=[0,5,6,7,8,9,10];
var SCALE=0;
// 無制限に広がれる自然系ブロック（fountain・park以外）
var FLOOD_NATURE={water:1,forest:1,mountain:1,flower:1,volcano:1,farm:1};

// ゴースト配置モード
var ghostState={
  active:false, id:null, cat:null,
  w:1, h:1,        // 配置サイズ（セル数）
  sizeIdx:0,       // 選択中のサイズバリアント
  anchorC:0, anchorR:0  // 左上セル座標
};

// ゴーストブロックのサイズバリアント定義
var GHOST_SIZES={
  stadium:[{w:3,h:3}],
  airport:[{w:3,h:6},{w:6,h:3}],
  bank:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  library:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  museum:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  landmark:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  port:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  station:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
  bridge:[{w:2,h:2},{w:2,h:3},{w:3,h:2}],
};
function isGhostBlock(id){return !!GHOST_SIZES[id];}

function ghostCanPlace(){
  var c=ghostState.anchorC,r=ghostState.anchorR,w=ghostState.w,h=ghostState.h;
  if(c<0||r<0||c+w>COLS||r+h>ROWS)return false;
  for(var dc=0;dc<w;dc++)for(var dr=0;dr<h;dr++){
    var k=(c+dc)+','+(r+dr);
    if(appGrid[k])return false;
  }
  return true;
}

function ghostRotate(){
  if(!ghostState.active)return;
  var variants=GHOST_SIZES[ghostState.id];
  if(!variants||variants.length<=1)return;
  ghostState.sizeIdx=(ghostState.sizeIdx+1)%variants.length;
  ghostState.w=variants[ghostState.sizeIdx].w;
  ghostState.h=variants[ghostState.sizeIdx].h;
  drawOverlay();
  updateGhostUI();
}

function ghostConfirm(){
  if(!ghostState.active||!ghostCanPlace())return;
  pushUndo();
  var c=ghostState.anchorC,r=ghostState.anchorR;
  var w=ghostState.w,h=ghostState.h;
  for(var dc=0;dc<w;dc++)for(var dr=0;dr<h;dr++){
    appGrid[(c+dc)+','+(r+dr)]={id:ghostState.id,dir:'none',groupId:null};
  }
  // グループ化
  var newGid='g'+(nextGroupId++);
  var cells=[];
  for(var dc2=0;dc2<w;dc2++)for(var dr2=0;dr2<h;dr2++){
    var pos={c:c+dc2,r:r+dr2};
    cells.push(pos);
    appGrid[pos.c+','+pos.r].groupId=newGid;
  }
  groupMap[newGid]={id:ghostState.id,cells:cells};
  ghostCancel();
  render();
  if(snapEnabled){playSnap(c,r);safeVibe([20,30,20]);}
}

function ghostCancel(){
  ghostState.active=false;
  updateGhostUI();
  octx.clearRect(0,0,ov.width,ov.height);
  if(!magActive&&magRaf){cancelAnimationFrame(magRaf);magRaf=null;}
}

function updateGhostUI(){
  var bar=document.getElementById('ghost-bar');
  if(!bar)return;
  if(ghostState.active){
    bar.style.display='flex';
    bar.className='active';
    var variants=GHOST_SIZES[ghostState.id];
    var rotBtn=document.getElementById('ghost-rotate');
    if(rotBtn)rotBtn.style.display=(variants&&variants.length>1)?'':'none';
    var sizeLabel=document.getElementById('ghost-size-label');
    if(sizeLabel)sizeLabel.textContent=ghostState.w+'×'+ghostState.h;
  } else {
    bar.style.display='none';
    bar.className='';
  }
}

function ghostMoveTo(screenX,screenY){
  // スクリーン座標→セル座標
  var p=cpos(screenX,screenY);
  ghostMoveToCell(Math.floor(p.x/CELL), Math.floor(p.y/CELL));
}
function ghostMoveToCell(c,r){
  ghostState.anchorC=c-Math.floor(ghostState.w/2);
  ghostState.anchorR=r-Math.floor(ghostState.h/2);
  drawOverlay();
  // magLoopが止まっていたら再起動
  if(!magActive){
    if(magRaf)cancelAnimationFrame(magRaf);
    magRaf=requestAnimationFrame(magLoop);
  }
}
// カスタムサイズルール: [minC_offset, minR_offset, w, h] の配列
var CUSTOM_SIZES={
  stadium:[
    [0,0,3,3],[0,-1,3,3],[0,-2,3,3],
    [-1,0,3,3],[-1,-1,3,3],[-1,-2,3,3],
    [-2,0,3,3],[-2,-1,3,3],[-2,-2,3,3],
  ],
  airport:[
    [0,0,3,6],[0,-1,3,6],[0,-2,3,6],[0,-3,3,6],[0,-4,3,6],[0,-5,3,6],
    [-1,0,3,6],[-1,-1,3,6],[-1,-2,3,6],[-1,-3,3,6],[-1,-4,3,6],[-1,-5,3,6],
    [-2,0,3,6],[-2,-1,3,6],[-2,-2,3,6],[-2,-3,3,6],[-2,-4,3,6],[-2,-5,3,6],
    [0,0,6,3],[0,-1,6,3],[0,-2,6,3],
    [-1,0,6,3],[-1,-1,6,3],[-1,-2,6,3],
    [-2,0,6,3],[-2,-1,6,3],[-2,-2,6,3],
    [-3,0,6,3],[-3,-1,6,3],[-3,-2,6,3],
    [-4,0,6,3],[-4,-1,6,3],[-4,-2,6,3],
    [-5,0,6,3],[-5,-1,6,3],[-5,-2,6,3],
  ],
};
// 2x2 + 2x3 パターンのブロック
var SIZE_2x2_2x3={bank:1,library:1,museum:1,landmark:1,port:1,station:1,bridge:1};
function getCustomTries(id,cc,cr){
  if(CUSTOM_SIZES[id]){
    return CUSTOM_SIZES[id].map(function(t){return [cc+t[0],cr+t[1],t[2],t[3]];});
  }
  if(SIZE_2x2_2x3[id]){
    return [
      [cc,cr,2,2],[cc-1,cr,2,2],[cc,cr-1,2,2],[cc-1,cr-1,2,2],
      [cc,cr,2,3],[cc-1,cr,2,3],[cc,cr-1,2,3],[cc-1,cr-1,2,3],[cc,cr-2,2,3],[cc-1,cr-2,2,3],
      [cc,cr,3,2],[cc-1,cr,3,2],[cc-2,cr,3,2],[cc,cr-1,3,2],[cc-1,cr-1,3,2],[cc-2,cr-1,3,2],
    ];
  }
  return null; // デフォルト（2x2まで）
}
function isFloodNature(id){return !!FLOOD_NATURE[id];}
function getBuildingSize(cells){var bb=groupBBox(cells);return {w:bb.w*SCALE,h:bb.h*SCALE};}
function getSizeLabel(cells){if(!SCALE)return '';var sz=getBuildingSize(cells);return sz.w+'×'+sz.h+' '+(t('blockUnit')||'ブロック');}
// appGrid: key="c,r" → {id, dir, groupId}
// dir: 'N'|'S'|'E'|'W'|'none'(自動)
var appGrid={};
var undoStack=[],redoStack=[];
var selBlock='house',curTool='draw',activeTab='住居';
function setSelBlock(id){if(selBlock!==id&&ghostState.active)ghostCancel();selBlock=id;}
var _dummy_selBlock;
var sheetOpen=false,snapTimer=null,touchSt=null,pinchD=null;
var magActive=false,magCur={x:0,y:0},rawP={x:0,y:0};
var hoverCell=null,prevMagCell=null,magRaf=null;
var MAG_R=0.5,MAG_E=0.18;
var longPressTimer=null,longPressCell=null;
var stampMode=false,stampLastCell=null;
var dragMoveMode=false,dragMoveKey=null,dragMoveOrigin=null;
var ctxJustOpened=false; // 今回の長押しでメニューを開いたフラグ
var ctxTargetKey=null;
var LONG_PRESS_MS=500;

// ---- Road logic ----
function isRoad(id){return id==='road';}
function isRoadAt(c,r){
  if(c<0||c>=COLS||r<0||r>=ROWS)return false;
  var cell=appGrid[c+','+r];
  return cell&&isRoad(cell.id);
}
function getRoadShape(c,r){
  var T=isRoadAt(c,r-1)?1:0;
  var B=isRoadAt(c,r+1)?1:0;
  var L=isRoadAt(c-1,r)?1:0;
  var R=isRoadAt(c+1,r)?1:0;
  var n=T+B+L+R;
  if(n===4)return 'cross';
  if(T&&B&&R&&!L)return 't-left';
  if(T&&B&&L&&!R)return 't-right';
  if(L&&R&&B&&!T)return 't-top';
  if(L&&R&&T&&!B)return 't-bottom';
  if(R&&B&&!T&&!L)return 'curve-tl';
  if(L&&B&&!T&&!R)return 'curve-tr';
  if(R&&T&&!B&&!L)return 'curve-bl';
  if(L&&T&&!B&&!R)return 'curve-br';
  if((T||B)&&!L&&!R)return 'vert';
  if((L||R)&&!T&&!B)return 'horiz';
  return 'alone';
}

// ---- Group / merge logic ----
var groupMap={};
var nextGroupId=1;

function getGroupId(c,r){var cell=appGrid[c+','+r];return cell?cell.groupId:null;}
function cellAt(c,r){return appGrid[c+','+r]||null;}

function groupBBox(cells){
  var minC=cells[0].c,maxC=cells[0].c,minR=cells[0].r,maxR=cells[0].r;
  for(var i=1;i<cells.length;i++){
    if(cells[i].c<minC)minC=cells[i].c;if(cells[i].c>maxC)maxC=cells[i].c;
    if(cells[i].r<minR)minR=cells[i].r;if(cells[i].r>maxR)maxR=cells[i].r;
  }
  return{minC:minC,maxC:maxC,minR:minR,maxR:maxR,w:maxC-minC+1,h:maxR-minR+1};
}

// 矩形の全セルが指定idで存在するか確認
function tryRect(minC,minR,w,h,id){
  if(minC<0||minR<0||minC+w>COLS||minR+h>ROWS)return null;
  var cells=[];
  for(var dc=0;dc<w;dc++){
    for(var dr=0;dr<h;dr++){
      var c2=appGrid[(minC+dc)+','+(minR+dr)];
      if(!c2||c2.id!==id)return null;
      cells.push({c:minC+dc,r:minR+dr});
    }
  }
  return cells;
}

// nc,nrを含む最大矩形を探す
// 合体条件：候補セルが全て「グループなし」か「同一グループのみ」
function tryMergeWith(nc,nr,id){
  var candidates=[
    tryRect(nc,nr,2,2,id),tryRect(nc-1,nr,2,2,id),
    tryRect(nc,nr-1,2,2,id),tryRect(nc-1,nr-1,2,2,id),
    tryRect(nc,nr,2,1,id),tryRect(nc-1,nr,2,1,id),
    tryRect(nc,nr,1,2,id),tryRect(nc,nr-1,1,2,id),
  ];
  var best=null;
  for(var i=0;i<candidates.length;i++){
    var cand=candidates[i];
    if(!cand||cand.length<=1)continue;
    // 候補セルが複数の既存グループを巻き込んでいないか確認
    var valid=true;
    var existingGid=null;
    for(var j=0;j<cand.length;j++){
      var cc=appGrid[cand[j].c+','+cand[j].r];
      if(!cc){valid=false;break;}
      if(cc.groupId){
        if(existingGid===null)existingGid=cc.groupId;
        else if(cc.groupId!==existingGid){valid=false;break;}
      }
    }
    if(valid&&(!best||cand.length>best.length))best=cand;
  }
  return best;
}

function recomputeGroups(centerC,centerR){
  var newCell=appGrid[centerC+','+centerR];

  // ---- 削除・消去の場合 ----
  if(!newCell||isRoad(newCell.id)){
    // 隣接グループのみ解体、それ以外は触らない
    var toDissolve={};
    var dirs4=[[1,0],[-1,0],[0,1],[0,-1],[0,0]];
    for(var di=0;di<dirs4.length;di++){
      var nc=centerC+dirs4[di][0],nr=centerR+dirs4[di][1];
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS)continue;
      var mc=appGrid[nc+','+nr];
      if(mc&&mc.groupId)toDissolve[mc.groupId]=1;
    }
    Object.keys(toDissolve).forEach(function(gid){
      var grp=groupMap[gid];
      if(grp){grp.cells.forEach(function(pos){var mc=appGrid[pos.c+','+pos.r];if(mc)mc.groupId=null;});delete groupMap[gid];}
    });
    return;
  }

  // ---- 配置の場合 ----
  var id=newCell.id;

  // FLOOD_NATURE: 無制限にBFS拡張
  if(isFloodNature(id)){
    // このセルが属する可能性のある既存グループを全解体
    var toDissolve2={};
    var bfsVisited={};
    var bfsQueue=[{c:centerC,r:centerR}];
    bfsVisited[centerC+','+centerR]=1;
    while(bfsQueue.length){
      var cur=bfsQueue.shift();
      var mc=appGrid[cur.c+','+cur.r];
      if(mc&&mc.groupId)toDissolve2[mc.groupId]=1;
      var dirs4b=[[1,0],[-1,0],[0,1],[0,-1]];
      for(var di2=0;di2<4;di2++){
        var nc2=cur.c+dirs4b[di2][0],nr2=cur.r+dirs4b[di2][1];
        var k2b=nc2+','+nr2;
        if(nc2<0||nc2>=COLS||nr2<0||nr2>=ROWS)continue;
        if(bfsVisited[k2b])continue;
        var mc2b=appGrid[k2b];
        if(mc2b&&mc2b.id===id){bfsVisited[k2b]=1;bfsQueue.push({c:nc2,r:nr2});}
      }
    }
    // 既存グループを解体
    Object.keys(toDissolve2).forEach(function(gid){
      var grp=groupMap[gid];
      if(grp){grp.cells.forEach(function(pos){var mc=appGrid[pos.c+','+pos.r];if(mc)mc.groupId=null;});delete groupMap[gid];}
    });
    // BFS結果でグループを再形成
    var floodCells=Object.keys(bfsVisited).map(function(k){
      var parts=k.split(',');return {c:parseInt(parts[0]),r:parseInt(parts[1])};
    });
    if(floodCells.length>=1){
      var newGid='g'+(nextGroupId++);
      groupMap[newGid]={id:id,cells:floodCells};
      floodCells.forEach(function(pos){var mc=appGrid[pos.c+','+pos.r];if(mc)mc.groupId=newGid;});
    }
    return;
  }

  // 新しいセルの直接隣接セルのグループIDを収集
  var adjGroups={};
  var dirs4=[[1,0],[-1,0],[0,1],[0,-1]];
  for(var di=0;di<dirs4.length;di++){
    var nc=centerC+dirs4[di][0],nr=centerR+dirs4[di][1];
    if(nc<0||nc>=COLS||nr<0||nr>=ROWS)continue;
    var mc=appGrid[nc+','+nr];
    if(mc&&mc.id===id&&mc.groupId)adjGroups[mc.groupId]=1;
  }

  // 新しいセルを含む完全矩形の候補を評価する
  // ルール: 候補に含まれる隣接グループより大きい矩形のみ解体許可
  var customTries=getCustomTries(id,centerC,centerR);
  var tries=customTries||[
    [centerC,centerR,2,2],[centerC-1,centerR,2,2],
    [centerC,centerR-1,2,2],[centerC-1,centerR-1,2,2],
    [centerC,centerR,2,1],[centerC-1,centerR,2,1],
    [centerC,centerR,1,2],[centerC,centerR-1,1,2],
  ];

  var best=null,bestGids=null;
  for(var ti=0;ti<tries.length;ti++){
    var t=tries[ti];
    var minC=t[0],minR=t[1],w=t[2],h=t[3];
    if(minC<0||minR<0||minC+w>COLS||minR+h>ROWS)continue;
    var ok=true;var cells2=[];var hasCenter=false;
    var involvedGids={};
    for(var dcl=0;dcl<w&&ok;dcl++){
      for(var drl=0;drl<h&&ok;drl++){
        var c2=minC+dcl,r2=minR+drl,k2=c2+','+r2;
        var mc2=appGrid[k2];
        if(!mc2||mc2.id!==id){ok=false;break;}
        // グループ済みなら、それが隣接グループ(adjGroups)かチェック
        if(mc2.groupId){
          if(!adjGroups[mc2.groupId]){ok=false;break;}// 無関係グループは巻き込めない
          involvedGids[mc2.groupId]=1;
        }
        cells2.push({c:c2,r:r2});
        if(c2===centerC&&r2===centerR)hasCenter=true;
      }
    }
    if(!ok||!hasCenter||cells2.length<=1)continue;
    // 巻き込む全グループのサイズ合計より大きいか確認
    // (グループを解体して大きくなる場合のみ許可)
    var involvedMaxSize=0;
    Object.keys(involvedGids).forEach(function(gid){
      var grp=groupMap[gid];if(grp&&grp.cells.length>involvedMaxSize)involvedMaxSize=grp.cells.length;
    });
    // 候補サイズが解体対象の最大グループサイズより大きい場合のみ許可
    if(involvedMaxSize>0&&cells2.length<=involvedMaxSize)continue;
    if(!best||cells2.length>best.length){best=cells2;bestGids=involvedGids;}
  }

  if(!best){
    // 合体なし → 何もしない（隣接グループは保持）
    return;
  }

  // bestに含まれるグループを解体
  var dissolvedCells=[];
  Object.keys(bestGids).forEach(function(gid){
    var grp=groupMap[gid];
    if(grp){
      grp.cells.forEach(function(pos){
        var mc=appGrid[pos.c+','+pos.r];
        if(mc){mc.groupId=null;dissolvedCells.push({c:pos.c,r:pos.r});}
      });
      delete groupMap[gid];
    }
  });

  // bestでグループ化
  var gid='g'+(nextGroupId++);
  var dirVal=newCell.dir||'none';
  best.forEach(function(pos){
    var mc=appGrid[pos.c+','+pos.r];
    if(mc){mc.groupId=gid;if(mc.dir&&mc.dir!=='none')dirVal=mc.dir;}
  });
  groupMap[gid]={id:id,cells:best,dir:dirVal};

  // 解体されてbestに含まれなかったセルを再グループ化
  var usedKeys={};
  best.forEach(function(pos){usedKeys[pos.c+','+pos.r]=1;});
  dissolvedCells.forEach(function(p){
    var pk=p.c+','+p.r;
    if(usedKeys[pk])return;
    var mc=appGrid[pk];
    if(!mc||mc.groupId)return;
    var best2=null;
    var tries2=[
      [p.c,p.r,2,2],[p.c-1,p.r,2,2],[p.c,p.r-1,2,2],[p.c-1,p.r-1,2,2],
      [p.c,p.r,2,1],[p.c-1,p.r,2,1],[p.c,p.r,1,2],[p.c,p.r-1,1,2],
    ];
    for(var ti2=0;ti2<tries2.length;ti2++){
      var t2=tries2[ti2];
      var minC2=t2[0],minR2=t2[1],w2=t2[2],h2=t2[3];
      if(minC2<0||minR2<0||minC2+w2>COLS||minR2+h2>ROWS)continue;
      var ok2=true;var cells3=[];var hasP=false;
      for(var dcl2=0;dcl2<w2&&ok2;dcl2++){
        for(var drl2=0;drl2<h2&&ok2;drl2++){
          var c3=minC2+dcl2,r3=minR2+drl2,k3=c3+','+r3;
          var mc3=appGrid[k3];
          if(!mc3||mc3.id!==mc.id||mc3.groupId||usedKeys[k3]){ok2=false;break;}
          cells3.push({c:c3,r:r3});
          if(c3===p.c&&r3===p.r)hasP=true;
        }
      }
      if(ok2&&hasP&&cells3.length>1&&(!best2||cells3.length>best2.length))best2=cells3;
    }
    if(best2&&best2.length>1){
      var gid2='g'+(nextGroupId++);
      best2.forEach(function(pos){
        var mc2=appGrid[pos.c+','+pos.r];
        if(mc2){mc2.groupId=gid2;usedKeys[pos.c+','+pos.r]=1;}
      });
      groupMap[gid2]={id:mc.id,cells:best2,dir:mc.dir||'none'};
    } else {
      usedKeys[pk]=1;
    }
  });
}

function fits2x2(cells){
  if(cells.length===0)return true;
  var minC=cells[0].c,maxC=cells[0].c,minR=cells[0].r,maxR=cells[0].r;
  for(var i=1;i<cells.length;i++){
    if(cells[i].c<minC)minC=cells[i].c;if(cells[i].c>maxC)maxC=cells[i].c;
    if(cells[i].r<minR)minR=cells[i].r;if(cells[i].r>maxR)maxR=cells[i].r;
  }
  return(maxC-minC<=1)&&(maxR-minR<=1);
}

// ---- 道路に面しているか判定 ----
function facesRoad(c,r){
  return isRoadAt(c-1,r)||isRoadAt(c+1,r)||isRoadAt(c,r-1)||isRoadAt(c,r+1);
}

// グループのどの辺が道路に面しているか（自動向き判定）
function autoDir(cells){
  var counts={N:0,S:0,W:0,E:0};
  for(var i=0;i<cells.length;i++){
    var c=cells[i].c,r=cells[i].r;
    if(isRoadAt(c,r-1))counts.N++;
    if(isRoadAt(c,r+1))counts.S++;
    if(isRoadAt(c-1,r))counts.W++;
    if(isRoadAt(c+1,r))counts.E++;
  }
  var best=null,bestVal=0;
  var dirs=['N','S','W','E'];
  for(var d=0;d<dirs.length;d++){
    if(counts[dirs[d]]>bestVal){bestVal=counts[dirs[d]];best=dirs[d];}
  }
  return best;
}

var audioOK=false,audioCtx=null;
function unlockAudio(){
  if(audioOK)return;
  try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC){audioOK=true;return;}audioCtx=new AC();var buf=audioCtx.createBuffer(1,1,22050);var src=audioCtx.createBufferSource();src.buffer=buf;src.connect(audioCtx.destination);if(src.start)src.start(0);else if(src.noteOn)src.noteOn(0);audioOK=true;}catch(e){audioOK=true;}
}
function playClick(freq,dur,vol){
  if(!soundEnabled||!audioOK||!audioCtx)return;
  try{if(audioCtx.state==='suspended')audioCtx.resume();var n=Math.floor(audioCtx.sampleRate*dur);var buf=audioCtx.createBuffer(1,n,audioCtx.sampleRate);var d=buf.getChannelData(0);var dec=2.5/(dur*audioCtx.sampleRate);for(var i=0;i<n;i++)d[i]=Math.sin(6.2832*freq*(i/audioCtx.sampleRate))*Math.exp(-i*dec);var src=audioCtx.createBufferSource();src.buffer=buf;var g=audioCtx.createGain();g.gain.value=vol;src.connect(g);g.connect(audioCtx.destination);if(src.start)src.start(0);else if(src.noteOn)src.noteOn(0);}catch(e){}
}

// ブロック拡大アニメ用
var lpAnim=null,lpAnimRaf=null;
var rippleAnim=null;

function runLpAnim(){
  if(!lpAnim)return;
  var elapsed=Date.now()-lpAnim.startTime;
  var dur=320; // アニメ全体320ms
  if(elapsed>dur){
    lpAnim=null;
    render(); // 通常描画に戻す
    return;
  }
  // 0→1のイージング: 拡大してから戻る (ease-out-bounce風)
  var t=elapsed/dur;
  var scale;
  if(t<0.35){
    // 前半: 1.0→1.22 に拡大
    scale=1.0+0.22*(t/0.35);
  } else {
    // 後半: 1.22→1.0 に戻る (overshootなし)
    var t2=(t-0.35)/0.65;
    scale=1.22-0.22*t2;
  }
  // 通常renderの後にアニメ対象だけ上書き描画
  render();
  var a=lpAnim;
  ctx.save();
  ctx.translate(a.cx,a.cy);
  ctx.scale(scale,scale);
  ctx.translate(-a.cx,-a.cy);
  // 対象セルを再描画（上書き）
  var cell=appGrid[a.key];
  if(cell){
    var inf=CMAP[cell.id];
    var grp=cell.groupId&&groupMap[cell.groupId]&&groupMap[cell.groupId].cells.length>1?groupMap[cell.groupId]:null;
    if(grp){
      var bb=groupBBox(grp.cells);
      var bx=bb.minC*CELL,by2=bb.minR*CELL,bW=bb.w*CELL,bH=bb.h*CELL;
      if(inf.cat==='r'){drawBuilding1x1(ctx,a.x,a.y,CELL,cell.id,inf.cat);}
      else if(grp.cells.length===4){drawBuilding2x2(ctx,bx,by2,CELL,cell.id,inf.cat);}
      else if(bW>bH){drawBuilding1x2(ctx,bx,by2,bW,bH,cell.id,inf.cat);}
      else{drawBuilding1x2(ctx,bx,by2,bW,bH,cell.id,inf.cat);}
    } else {
      drawBuilding1x1(ctx,a.x,a.y,CELL,cell.id,inf.cat);
    }
    // 拡大時のゴールドグロー枠（ブロック周辺のみ）
    var bw2=(grp?groupBBox(grp.cells).w:1)*CELL;
    var bh2=(grp?groupBBox(grp.cells).h:1)*CELL;
    var bx2=grp?groupBBox(grp.cells).minC*CELL:a.x;
    var by3=grp?groupBBox(grp.cells).minR*CELL:a.y;
    // 外側グロー（太め半透明）
    ctx.strokeStyle='rgba(245,200,66,'+(0.55*(1-t*0.5))+')';
    ctx.lineWidth=CELL*0.18;
    ctx.strokeRect(bx2,by3,bw2,bh2);
    // 内側シャープ枠
    ctx.strokeStyle='rgba(255,220,80,'+(1-t*0.6)+')';
    ctx.lineWidth=CELL*0.06;
    ctx.strokeRect(bx2,by3,bw2,bh2);
  }
  ctx.restore();
  lpAnimRaf=requestAnimationFrame(runLpAnim);
}

function longPressSuccess(key){
  // バイブ（Android）
  safeVibe([30,60,60]);
  // 音（iOS含む全デバイス）
  if(soundEnabled&&audioOK&&audioCtx){
    try{
      [0,0.1].forEach(function(delay){
        var o=audioCtx.createOscillator();
        var g=audioCtx.createGain();
        o.connect(g);g.connect(audioCtx.destination);
        o.frequency.value=520;o.type='sine';
        var t=audioCtx.currentTime+delay;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.15,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
        o.start(t);o.stop(t+0.1);
      });
    }catch(e){}
  }
  // ブロック拡大アニメ
  if(key&&appGrid[key]){
    var parts=key.split(',');
    var c=parseInt(parts[0]),r=parseInt(parts[1]);
    var cell=appGrid[key];
    var grp=cell.groupId&&groupMap[cell.groupId]&&groupMap[cell.groupId].cells.length>1?groupMap[cell.groupId]:null;
    var bb=grp?groupBBox(grp.cells):{minC:c,minR:r,w:1,h:1};
    var cx2=bb.minC*CELL+bb.w*CELL/2;
    var cy2=bb.minR*CELL+bb.h*CELL/2;
    if(lpAnimRaf)cancelAnimationFrame(lpAnimRaf);
    lpAnim={key:key,x:c*CELL,y:r*CELL,cx:cx2,cy:cy2,startTime:Date.now()};
    lpAnimRaf=requestAnimationFrame(runLpAnim);
  }
}

      var o=audioCtx.createOscillator();
      var g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);

      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.12,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t);o.stop(t+0.16);
    }catch(e){}
  }

}

// 合体サウンド：低音ドスン＋高音チャイム
function playMergeSound(size){
  if(!audioOK||!audioCtx)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    var sr=audioCtx.sampleRate;
    var n1=Math.floor(sr*0.12);
    var buf1=audioCtx.createBuffer(1,n1,sr);
    var d1=buf1.getChannelData(0);
    for(var i=0;i<n1;i++){var t=i/sr;var freq=180*Math.exp(-t*18);d1[i]=Math.sin(6.2832*freq*t)*Math.exp(-t*22)*(1+0.3*Math.random());}
    var src1=audioCtx.createBufferSource();src1.buffer=buf1;
    var g1=audioCtx.createGain();g1.gain.value=size===4?0.55:0.35;
    src1.connect(g1);g1.connect(audioCtx.destination);if(src1.start)src1.start(0);
    var n2=Math.floor(sr*0.18);
    var buf2=audioCtx.createBuffer(1,n2,sr);
    var d2=buf2.getChannelData(0);
    var baseFreq=size===4?880:660;
    for(var j=0;j<n2;j++){var t2=j/sr;d2[j]=(Math.sin(6.2832*baseFreq*t2)+0.3*Math.sin(6.2832*baseFreq*2*t2))*Math.exp(-t2*14);}
    var src2=audioCtx.createBufferSource();src2.buffer=buf2;
    var g2=audioCtx.createGain();g2.gain.value=size===4?0.22:0.15;
    src2.connect(g2);g2.connect(audioCtx.destination);
    if(src2.start)src2.start(audioCtx.currentTime+(size===4?0.04:0.03));
  }catch(e){}
}

// 合体ビジュアルエフェクト
var mergeEffects=[];
var mergeRaf=null;

function triggerMergeEffect(cells,size){
  if(!snapEnabled)return;
  var bbox=groupBBox(cells);
  var pw=bbox.w*CELL,ph=bbox.h*CELL;
  var cxe=bbox.minC*CELL+pw/2,cye=bbox.minR*CELL+ph/2;
  if(size===4)safeVibe([20,30,20]);
  else if(size>=2)safeVibe([15,0,15]);
  playMergeSound(size);
  mergeEffects.push({cx:cxe,cy:cye,pw:pw,ph:ph,size:size,t:0,maxT:size===4?30:22});
  if(!mergeRaf)runMergeAnim();
}

function runMergeAnim(){
  if(mergeEffects.length===0){mergeRaf=null;return;}
  mergeRaf=requestAnimationFrame(function(){
    drawOverlay();
    for(var ei=0;ei<mergeEffects.length;ei++){
      var ef=mergeEffects[ei];ef.t++;
      var prog=ef.t/ef.maxT;
      var eased=1-Math.pow(1-prog,3);
      octx.save();
      var sc2=1+eased*0.22;var edgeA=Math.max(0,(1-prog)*0.95);
      octx.strokeStyle='rgba(255,220,50,'+edgeA+')';octx.lineWidth=3+eased*5;
      octx.strokeRect(ef.cx-ef.pw/2*sc2,ef.cy-ef.ph/2*sc2,ef.pw*sc2,ef.ph*sc2);
      if(prog<0.3){octx.fillStyle='rgba(255,255,255,'+((1-prog/0.3)*0.5)+')';octx.fillRect(ef.cx-ef.pw/2,ef.cy-ef.ph/2,ef.pw,ef.ph);}
      var numP=ef.size===4?14:7;
      for(var pi=0;pi<numP;pi++){
        var angle=(pi/numP)*6.2832+(eased*0.5);
        var spd=(ef.size===4?CELL*0.9:CELL*0.55)*eased;
        var pA=Math.max(0,1-prog*1.5);var pSz=Math.max(0,(1-prog)*(ef.size===4?5.5:3.5));
        octx.beginPath();octx.arc(ef.cx+Math.cos(angle)*spd,ef.cy+Math.sin(angle)*spd,pSz,0,6.2832);
        octx.fillStyle=pi%2===0?'rgba(255,220,50,'+pA+')':'rgba(255,255,255,'+pA+')';octx.fill();
      }
      if(ef.size===4&&prog<0.65){
        var sA=Math.max(0,(0.65-prog)/0.65);var ssc=0.4+eased*0.9;
        octx.save();octx.globalAlpha=sA;
        octx.font=Math.floor(CELL*0.48*ssc)+'px serif';
        octx.textAlign='center';octx.textBaseline='middle';
        octx.shadowColor='rgba(255,200,0,0.9)';octx.shadowBlur=14;
        octx.fillText('\u2728',ef.cx,ef.cy-ef.ph*0.42);
        octx.restore();
      }
      octx.restore();
    }
    mergeEffects=mergeEffects.filter(function(e){return e.t<e.maxT;});
    runMergeAnim();
  });
}

function resize(){gc.width=COLS*CELL;gc.height=ROWS*CELL;ov.width=COLS*CELL;ov.height=ROWS*CELL;}

function drawRoad(x,y,shape){
  var s=CELL,cx2=x+s/2,cy2=y+s/2,hw=s*0.28;
  ctx.fillStyle='#444';ctx.fillRect(x,y,s,s);
  ctx.fillStyle='#888';
  var T=false,B=false,L=false,R=false;
  if(shape==='cross'){T=B=L=R=true;}
  else if(shape==='t-left'){T=B=R=true;}
  else if(shape==='t-right'){T=B=L=true;}
  else if(shape==='t-top'){L=R=B=true;}
  else if(shape==='t-bottom'){L=R=T=true;}
  else if(shape==='curve-tl'){R=B=true;}
  else if(shape==='curve-tr'){L=B=true;}
  else if(shape==='curve-bl'){R=T=true;}
  else if(shape==='curve-br'){L=T=true;}
  else if(shape==='horiz'){L=R=true;}
  else if(shape==='vert'){T=B=true;}
  if(T||B||L||R){ctx.fillRect(cx2-hw,cy2-hw,hw*2,hw*2);}
  if(T)ctx.fillRect(cx2-hw,y,hw*2,cy2-hw-y);
  if(B)ctx.fillRect(cx2-hw,cy2+hw,hw*2,y+s-cy2-hw);
  if(L)ctx.fillRect(x,cy2-hw,cx2-hw-x,hw*2);
  if(R)ctx.fillRect(cx2+hw,cy2-hw,x+s-cx2-hw,hw*2);
  if(shape==='alone'){ctx.beginPath();ctx.arc(cx2,cy2,hw,0,6.2832);ctx.fill();}
  ctx.strokeStyle='rgba(255,235,59,0.7)';ctx.lineWidth=Math.max(1,s*0.04);ctx.setLineDash([s*0.14,s*0.14]);
  if(T){ctx.beginPath();ctx.moveTo(cx2,y);ctx.lineTo(cx2,cy2-hw);ctx.stroke();}
  if(B){ctx.beginPath();ctx.moveTo(cx2,cy2+hw);ctx.lineTo(cx2,y+s);ctx.stroke();}
  if(L){ctx.beginPath();ctx.moveTo(x,cy2);ctx.lineTo(cx2-hw,cy2);ctx.stroke();}
  if(R){ctx.beginPath();ctx.moveTo(cx2+hw,cy2);ctx.lineTo(x+s,cy2);ctx.stroke();}
  ctx.setLineDash([]);
  if(shape==='cross'||shape==='t-left'||shape==='t-right'||shape==='t-top'||shape==='t-bottom'){ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(cx2,cy2,hw*0.3,0,6.2832);ctx.fill();}
}

// 玄関ドアを向いている面に描く
function drawDirArrow(ctx2,cx2,cy2,dir,size,alpha,W,H){
  if(!dir||dir==='none')return;
  ctx2.save();
  ctx2.globalAlpha=(alpha||0.9);
  // ドアのサイズ（ブロックサイズに対して相対的に）
  var s=size||CELL*0.18;
  var dw=s*2.2;   // ドア幅
  var dh=s*3.0;   // ドア高さ
  var bw=W||CELL; // ブロック幅
  var bh=H||CELL; // ブロック高さ
  // ブロック端からの距離
  var edge=s*0.15;
  var dx=cx2, dy=cy2;  // ドア中心X,Y
  var rot=0;
  if(dir==='N'){dy=cy2-bh/2+edge;rot=0;}
  else if(dir==='S'){dy=cy2+bh/2-edge-dh;rot=0;}
  else if(dir==='W'){dx=cx2-bw/2+edge;rot=-Math.PI/2;}
  else if(dir==='E'){dx=cx2+bw/2-edge-dh;rot=Math.PI/2;}
  ctx2.translate(dx,dy);
  ctx2.rotate(rot);
  // ドア枠（外）
  ctx2.fillStyle='rgba(0,0,0,0.55)';
  ctx2.beginPath();
  ctx2.rect(-dw/2,0,dw,dh);
  ctx2.arc(0,0,dw/2,Math.PI,0);
  ctx2.fill();
  // ドア本体
  var inset=s*0.18;
  ctx2.fillStyle='rgba(80,40,10,0.9)';
  ctx2.beginPath();
  ctx2.rect(-dw/2+inset,inset,dw-inset*2,dh-inset);
  ctx2.arc(0,inset,dw/2-inset,Math.PI,0);
  ctx2.fill();
  // ドアの縦の仕切り線
  ctx2.strokeStyle='rgba(0,0,0,0.4)';
  ctx2.lineWidth=s*0.12;
  ctx2.beginPath();
  ctx2.moveTo(0,inset);ctx2.lineTo(0,dh);
  ctx2.stroke();
  // ドアノブ
  ctx2.fillStyle='rgba(255,200,50,0.95)';
  ctx2.beginPath();
  ctx2.arc(dw/2-inset-s*0.22,dh*0.6,s*0.18,0,6.2832);
  ctx2.fill();
  ctx2.beginPath();
  ctx2.arc(-dw/2+inset+s*0.22,dh*0.6,s*0.18,0,6.2832);
  ctx2.fill();
  // 上部アーチのガラス（光）
  ctx2.fillStyle='rgba(180,230,255,0.35)';
  ctx2.beginPath();
  ctx2.arc(0,inset,dw/2-inset,Math.PI,0);
  ctx2.lineTo(inset,inset);
  ctx2.arc(0,inset,dw/2-inset*2.2,0,Math.PI,true);
  ctx2.closePath();
  ctx2.fill();
  ctx2.restore();
}

// 道路縁取りを描く
function drawRoadEdge(x,y,c,r){
  var s=CELL;
  var cx2=x+s/2,cy2=y+s/2;
  // 道路に面した辺にドアを描く
  if(isRoadAt(c,r-1))drawFacadeDoor(ctx,cx2,y,s,'N');
  if(isRoadAt(c,r+1))drawFacadeDoor(ctx,cx2,y+s,s,'S');
  if(isRoadAt(c-1,r))drawFacadeDoor(ctx,x,cy2,s,'W');
  if(isRoadAt(c+1,r))drawFacadeDoor(ctx,x+s,cy2,s,'E');
}

// 建物の辺にドアを描く（道路接面用）
function drawFacadeDoor(ctx2,ex,ey,s,dir){
  // ex,ey = 辺の中点, dir = どの辺か
  var dw=s*0.28; // ドア幅
  var dh=s*0.30; // ドア高さ
  ctx2.save();
  ctx2.translate(ex,ey);
  // dirに応じて向きを変える
  if(dir==='N'){ctx2.translate(0,0);}          // 上辺 → 下向きに描く
  else if(dir==='S'){ctx2.scale(1,-1);}        // 下辺 → 上向き
  else if(dir==='W'){ctx2.rotate(Math.PI/2);}  // 左辺 → 右向き
  else if(dir==='E'){ctx2.rotate(-Math.PI/2);} // 右辺 → 左向き
  // ドア枠（外）
  ctx2.fillStyle='rgba(0,0,0,0.6)';
  ctx2.beginPath();
  ctx2.rect(-dw/2,0,dw,dh);
  ctx2.arc(0,0,dw/2,Math.PI,0);
  ctx2.fill();
  // ドア本体（木）
  var ins=s*0.03;
  ctx2.fillStyle='rgba(90,45,10,0.92)';
  ctx2.beginPath();
  ctx2.rect(-dw/2+ins,ins,dw-ins*2,dh-ins);
  ctx2.arc(0,ins,dw/2-ins,Math.PI,0);
  ctx2.fill();
  // 中央仕切り
  ctx2.strokeStyle='rgba(0,0,0,0.35)';
  ctx2.lineWidth=s*0.02;
  ctx2.beginPath();ctx2.moveTo(0,ins);ctx2.lineTo(0,dh);ctx2.stroke();
  // ドアノブ×2
  ctx2.fillStyle='rgba(255,200,50,0.95)';
  [-1,1].forEach(function(side){
    ctx2.beginPath();
    ctx2.arc(side*(dw/2-ins-s*0.04),dh*0.62,s*0.03,0,6.2832);
    ctx2.fill();
  });
  // アーチガラス
  ctx2.fillStyle='rgba(180,230,255,0.38)';
  ctx2.beginPath();
  ctx2.arc(0,ins,dw/2-ins,Math.PI,0);
  ctx2.lineTo(ins,ins);
  ctx2.arc(0,ins,dw/2-ins*2.5,0,Math.PI,true);
  ctx2.closePath();
  ctx2.fill();
  ctx2.restore();
}

// グループ外枠を描く
function drawGroupBorder(cells,color){
  if(!cells||cells.length<2)return;
  var bbox=groupBBox(cells);
  var x=bbox.minC*CELL,y=bbox.minR*CELL;
  var w=bbox.w*CELL,h=bbox.h*CELL;
  ctx.save();
  ctx.strokeStyle=color||'rgba(96,165,250,0.5)';
  ctx.lineWidth=3;
  ctx.strokeRect(x+1,y+1,w-2,h-2);
  ctx.restore();
}


var drawnGroups={};

function render(){
  resize();ctx.clearRect(0,0,gc.width,gc.height);
  drawnGroups={};
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var key=c+','+r;var cell=appGrid[key];var x=c*CELL,y=r*CELL;
      if(!cell){ctx.fillStyle='#06090f';ctx.fillRect(x,y,CELL,CELL);}
      else if(cell.id==='road'){drawRoad(x,y,getRoadShape(c,r));}
      else{
        var inf0=CMAP[cell.id];
        var bgColor=inf0?(inf0.cat==='b'?'#0a1628':inf0.cat==='n'?'#061f10':'#181818'):'#0a1628';
        ctx.fillStyle=bgColor;ctx.fillRect(x,y,CELL,CELL);
        drawRoadEdge(x,y,c,r);
      }
      if(showGrid){ctx.strokeStyle='#0c1322';ctx.lineWidth=.5;ctx.strokeRect(x,y,CELL,CELL);}
    }
  }
  var drawnIllust={};
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var key=c+','+r;var cell=appGrid[key];
      if(!cell||cell.id==='road')continue;
      var inf=CMAP[cell.id];if(!inf)continue;
      var x=c*CELL,y=r*CELL;
      var grp=null;
      if(cell.groupId&&groupMap[cell.groupId]&&groupMap[cell.groupId].cells.length>1)grp=groupMap[cell.groupId];
      if(!grp){
        drawBuilding1x1(ctx,x,y,CELL,cell.id,inf.cat);
      } else if(isFloodNature(cell.id)){
        // FloodNature: 各セルに1x1パターンをタイル描画
        drawBuilding1x1(ctx,x,y,CELL,cell.id,inf.cat);
      } else {
        if(!drawnIllust[cell.groupId]){
          drawnIllust[cell.groupId]=1;
          var bb=groupBBox(grp.cells);
          var bx2=bb.minC*CELL,by2=bb.minR*CELL,bW=bb.w*CELL,bH=bb.h*CELL;
          var nc=grp.cells.length;
          if(nc===9&&bb.w===3&&bb.h===3){
            drawBuilding3x3(ctx,bx2,by2,CELL,cell.id);
          } else if((nc===18)&&((bb.w===3&&bb.h===6)||(bb.w===6&&bb.h===3))){
            drawBuilding3x6(ctx,bx2,by2,CELL,cell.id,bb.w,bb.h);
          } else if(nc===4&&bb.w===2&&bb.h===2){
            drawBuilding2x2(ctx,bx2,by2,CELL,cell.id,inf.cat);
          } else {
            drawBuilding1x2(ctx,bx2,by2,bW,bH,cell.id,inf.cat);
          }
          drawGroupBorder(grp.cells,null);
        }
      }
      var effDir=cell.dir||'none';
      if(effDir==='none'){var ad=autoDir([{c:c,r:r}]);if(ad)effDir=ad;}
      if(effDir&&effDir!=='none'){
        var showArrow=true;
        if(grp){showArrow=!drawnGroups['arrow_'+cell.groupId];if(showArrow)drawnGroups['arrow_'+cell.groupId]=1;}
        if(showArrow){
          var arrowX=x+CELL/2,arrowY=y+CELL/2;
          if(grp){var bb3=groupBBox(grp.cells);arrowX=bb3.minC*CELL+(bb3.w*CELL)/2;arrowY=bb3.minR*CELL+(bb3.h*CELL)/2;}
          // グループサイズを計算してドアに渡す
          var doorW=CELL,doorH=CELL;
          if(grp){var bb4=groupBBox(grp.cells);doorW=bb4.w*CELL;doorH=bb4.h*CELL;}
          drawDirArrow(ctx,arrowX,arrowY,effDir,CELL*0.18,0.75,doorW,doorH);
        }
      }
      if(grp&&grp.cells.length>1&&!isFloodNature(cell.id)&&!drawnGroups['lbl_'+cell.groupId]){
        drawnGroups['lbl_'+cell.groupId]=1;
        var bb5=groupBBox(grp.cells);
        var lx=bb5.minC*CELL+bb5.w*CELL/2;
        var ly=(bb5.minR+bb5.h)*CELL-2;
        var lbl=getSizeLabel(grp.cells);
        var fs=Math.max(9,Math.min(Math.floor(CELL*0.22),13));
        ctx.save();
        ctx.font='bold '+fs+'px "Noto Sans JP",sans-serif';
        ctx.textAlign='center';ctx.textBaseline='bottom';
        var tw=ctx.measureText(lbl).width;
        ctx.fillStyle='rgba(0,0,0,0.65)';
        ctx.fillRect(r2(lx-tw/2-3),r2(ly-fs-2),r2(tw+6),fs+4);
        ctx.fillStyle='#f5c842';
        ctx.fillText(lbl,lx,ly);
        ctx.restore();
      }
    }
  }
  document.getElementById('btn-undo').disabled=!undoStack.length;
  document.getElementById('btn-redo').disabled=!redoStack.length;
  drawOverlay();
}

// ---- Building illustration drawing ----

function r2(n){return Math.round(n);}

// 共通ヘルパー：窓を格子状に描く
function drawWindows(ctx,x,y,w,h,cols,rows,winColor,litColor){
  var padX=Math.floor(w*0.1),padY=Math.floor(h*0.08);
  var gapX=Math.floor(w*0.06),gapY=Math.floor(h*0.06);
  var ww=Math.floor((w-padX*2-gapX*(cols-1))/cols);
  var wh=Math.floor((h-padY*2-gapY*(rows-1))/rows);
  if(ww<2||wh<2)return;
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var wx=x+padX+(ww+gapX)*c;
      var wy=y+padY+(wh+gapY)*r;
      ctx.fillStyle=(r*cols+c)%7===3?litColor:winColor;
      ctx.fillRect(r2(wx),r2(wy),r2(ww),r2(wh));
    }
  }
}

// ---- 自然系1×1 ----
function drawNature1x1(ctx,x,y,S,id){
  var cx=x+S/2,cy=y+S/2;
  // 共通背景
  ctx.fillStyle='#061f10';ctx.fillRect(x,y,S,S);
  if(id==='park'||id==='forest'){
    ctx.fillStyle='#1e6b3a';ctx.fillRect(x,y,S,S);
    var num=id==='forest'?3:2;

}

}

var magCur={x:0,y:0},magRaf=null;
var touchSt=null,pinchD=null;

function cpos(screenX,screenY){
  var cr=gc.getBoundingClientRect();
  var sx=gc.width/cr.width,sy=gc.height/cr.height;
  return {x:(screenX-cr.left)*sx,y:(screenY-cr.top)*sy};
}

function getCell(screenX,screenY){
  var p=cpos(screenX,screenY);
  var c=Math.floor(p.x/CELL),r=Math.floor(p.y/CELL);
  return(c>=0&&c<COLS&&r>=0&&r<ROWS)?{c:c,r:r}:null;
}

function takeSnap(){return JSON.stringify({grid:appGrid,groups:groupMap,nextGid:nextGroupId});}
function pushUndo(){undoStack.push(takeSnap());if(undoStack.length>60)undoStack.shift();redoStack=[];}
function restoreSnap(s){var d=JSON.parse(s);appGrid=d.grid;groupMap=d.groups;nextGroupId=d.nextGid;}

function flood(c,r,fromId,toId,visited){
  var key=c+','+r;
  if(visited[key])return;
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  var cell=appGrid[key];
  if(fromId===undefined){if(cell)return;}
  else{if(!cell||cell.id!==fromId)return;}
  visited[key]=1;
  pushUndo();
  if(toId==='erase'){delete appGrid[key];}
  else{appGrid[key]={id:toId,dir:'none',groupId:null};}
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(d){flood(c+d[0],r+d[1],fromId,toId,visited);});
}

function placeBlock(cell){
  if(!cell)return;
  var key=cell.c+','+cell.r;
  if(curTool==='erase'){
    if(!appGrid[key])return;
    pushUndo();
    var gid=appGrid[key].groupId;
    if(gid&&groupMap[gid]){
      groupMap[gid].cells.forEach(function(pos){delete appGrid[pos.c+','+pos.r];});
      delete groupMap[gid];
    } else {delete appGrid[key];}
    recomputeGroups(cell.c,cell.r);
    render();
  } else if(curTool==='fill'){
    var fromId=appGrid[key]?appGrid[key].id:undefined;
    if(fromId===selBlock)return;
    pushUndo();
    var vis={};
    (function floodFill(c,r){
      var k=c+','+r;if(vis[k])return;
      if(c<0||c>=COLS||r<0||r>=ROWS)return;
      var cell2=appGrid[k];
      if(fromId===undefined){if(cell2)return;}
      else{if(!cell2||cell2.id!==fromId)return;}
      vis[k]=1;
      appGrid[k]={id:selBlock,dir:'none',groupId:null};
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(d){floodFill(c+d[0],r+d[1]);});
    })(cell.c,cell.r);
    Object.keys(vis).forEach(function(k){var sp=k.split(',');recomputeGroups(parseInt(sp[0]),parseInt(sp[1]));});
    render();
  } else {
    // ゴーストブロックの場合
    if(isGhostBlock(selBlock)){
      if(!ghostState.active){
        ghostState.active=true;
        ghostState.id=selBlock;
        ghostState.cat=CMAP[selBlock]?CMAP[selBlock].cat:'b';
        ghostState.sizeIdx=0;
        var vs=GHOST_SIZES[selBlock];
        ghostState.w=vs[0].w; ghostState.h=vs[0].h;
        ghostMoveToCell(cell.c, cell.r);  // アンカー設定＆即描画
        updateGhostUI();
      } else {
        // 既にゴーストアクティブ → 確定
        ghostMoveToCell(cell.c,cell.r);
        ghostConfirm();
      }
      return;
    }
    if(appGrid[key]&&appGrid[key].id===selBlock)return;
    pushUndo();
    appGrid[key]={id:selBlock,dir:'none',groupId:null};
    recomputeGroups(cell.c,cell.r);
    render();
    if(snapEnabled){
      playSnap(cell.c,cell.r);
      var grp=appGrid[key]&&appGrid[key].groupId?groupMap[appGrid[key].groupId]:null;
      var sz=grp?grp.cells.length:1;
      if(sz===4)safeVibe([20,30,20]);
      else if(sz>=2)safeVibe([15,0,15]);
      else safeVibe(10);
    }
  }
}

function playSnap(c,r){
  if(!snapEnabled||!soundEnabled||!audioOK||!audioCtx)return;
  try{
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=800+c*4+r*3;o.type='sine';
    var t=audioCtx.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.08,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.start(t);o.stop(t+0.13);
  }catch(e){}
}

function showCtxMenu(key,screenX,screenY){
  ctxTargetKey=key;
  var cell=appGrid[key];
  var curDir=(cell&&cell.dir)||'none';

function drawOverlay(){
  octx.clearRect(0,0,ov.width,ov.height);
  // ゴースト描画
  if(ghostState.active){
    var gc2=ghostState.anchorC,gr2=ghostState.anchorR;
    var gw2=ghostState.w,gh2=ghostState.h;
    var canP=ghostCanPlace();
    var gx=gc2*CELL,gy=gr2*CELL,gW=gw2*CELL,gH=gh2*CELL;
    // 範囲外クリップ
    if(gc2+gw2>0&&gr2+gh2>0&&gc2<COLS&&gr2<ROWS){
      octx.save();
      octx.globalAlpha=0.55;
      // イラストを描画
      var tmpC=document.createElement('canvas');
      tmpC.width=gW;tmpC.height=gH;
      var tmpCtx=tmpC.getContext('2d');
      var gid2=ghostState.id,cat2=ghostState.cat;
      if(gw2===1&&gh2===1){drawBuilding1x1(tmpCtx,0,0,CELL,gid2,cat2);}
      else if(gw2===3&&gh2===3){drawBuilding3x3(tmpCtx,0,0,CELL,gid2);}
      else if((gw2===3&&gh2===6)||(gw2===6&&gh2===3)){drawBuilding3x6(tmpCtx,0,0,CELL,gid2,gw2,gh2);}
      else if(gw2===2&&gh2===2){drawBuilding2x2(tmpCtx,0,0,CELL,gid2,cat2);}
      else{drawBuilding1x2(tmpCtx,0,0,gW,gH,gid2,cat2);}
      octx.drawImage(tmpC,gx,gy);
      octx.globalAlpha=1;
      // 枠線（配置可: 緑, 不可: 赤）
      octx.strokeStyle=canP?'rgba(100,255,100,0.9)':'rgba(255,80,80,0.9)';
      octx.lineWidth=3;
      octx.strokeRect(gx+1,gy+1,gW-2,gH-2);
      // セルごとのグリッド
      octx.strokeStyle=canP?'rgba(100,255,100,0.4)':'rgba(255,80,80,0.4)';
      octx.lineWidth=1;
      for(var dc3=0;dc3<gw2;dc3++)for(var dr3=0;dr3<gh2;dr3++){
        octx.strokeRect(gx+dc3*CELL,gy+dr3*CELL,CELL,CELL);
      }
      octx.restore();
    }
  }
  // リップルアニメ
  if(rippleAnim){
    var elapsed=Date.now()-rippleAnim.startTime;
    var dur=500;
    if(elapsed>dur){rippleAnim=null;}
    else{
      var rt=elapsed/dur;
      var rcx=rippleAnim.cx,rcy=rippleAnim.cy;
      [0,0.18,0.36].forEach(function(offset){
        var tp=Math.max(0,(rt-offset)/(1-offset));
        if(tp<=0)return;
        var rr=CELL*(0.6+tp*2.8);
        var alpha=0.75*(1-tp)*(1-tp);
        octx.save();
        octx.strokeStyle='rgba(59,158,255,'+alpha+')';
        octx.lineWidth=Math.max(1,CELL*0.1*(1-tp));
        octx.beginPath();octx.arc(rcx,rcy,rr,0,6.2832);octx.stroke();
        octx.restore();
      });
    }
  }
  if(!magActive||!hoverCell)return;
  var tx=hoverCell.c*CELL+CELL/2,ty=hoverCell.r*CELL+CELL/2;
  var cx2=magCur.x,cy2=magCur.y;
  var dist=Math.sqrt((cx2-tx)*(cx2-tx)+(cy2-ty)*(cy2-ty));
  var p=Math.max(0,Math.min(1,1-dist/(CELL*MAG_R*1.6)));
  var bx=hoverCell.c*CELL,by=hoverCell.r*CELL;
  octx.save();octx.strokeStyle='rgba(96,165,250,'+(0.06+p*0.18)+')';octx.lineWidth=CELL*0.12;octx.strokeRect(bx+1,by+1,CELL-2,CELL-2);
  octx.strokeStyle='rgba(148,197,255,'+(p*0.45)+')';octx.lineWidth=1.5;octx.strokeRect(bx+1,by+1,CELL-2,CELL-2);octx.restore();
  if(p>0.08){
    octx.save();octx.strokeStyle='rgba(96,165,250,'+(p*0.55)+')';octx.lineWidth=1.2;
    var dirs2=[[1,0],[-1,0],[0,1],[0,-1]];
    for(var i=0;i<dirs2.length;i++){var dx2=dirs2[i][0],dy2=dirs2[i][1];var al=CELL*(0.1+p*0.12),as3=CELL*(0.46+p*0.07);var sx3=tx+dx2*as3,sy3=ty+dy2*as3,ex2=tx+dx2*(as3-al),ey2=ty+dy2*(as3-al);octx.beginPath();octx.moveTo(sx3,sy3);octx.lineTo(ex2,ey2);octx.stroke();var h2=2*p;octx.beginPath();octx.moveTo(ex2,ey2);octx.lineTo(ex2-dx2*h2+dy2*h2*.6,ey2-dy2*h2+dx2*h2*.6);octx.moveTo(ex2,ey2);octx.lineTo(ex2-dx2*h2-dy2*h2*.6,ey2-dy2*h2-dx2*h2*.6);octx.stroke();}
    octx.restore();
  }
  if(curTool==='draw'&&selBlock!=='road'){var inf3=CMAP[selBlock];if(inf3){octx.save();octx.globalAlpha=0.28+p*0.28;octx.font=Math.floor(CELL*.66)+'px serif';octx.textAlign='center';octx.textBaseline='middle';octx.fillText(inf3.e,tx+(cx2-tx)*(1-p),ty+(cy2-ty)*(1-p)+1);octx.restore();}}
  octx.save();octx.beginPath();octx.arc(cx2+(tx-cx2)*p*.8,cy2+(ty-cy2)*p*.8,2+p*2,0,6.2832);octx.fillStyle='rgba(96,165,250,'+(0.5+p*0.45)+')';octx.fill();octx.restore();
}

function magLoop(){
  if(!magActive&&!ghostState.active){octx.clearRect(0,0,ov.width,ov.height);return;}
  if(!magActive&&ghostState.active){drawOverlay();magRaf=requestAnimationFrame(magLoop);return;}
  if(hoverCell){var tx=hoverCell.c*CELL+CELL/2,ty=hoverCell.r*CELL+CELL/2;var d=Math.sqrt((rawP.x-tx)*(rawP.x-tx)+(rawP.y-ty)*(rawP.y-ty));var ck=hoverCell.c+','+hoverCell.r;if(ck!==prevMagCell&&d<CELL*MAG_R){prevMagCell=ck;if(snapEnabled)playClick(400,0.016,0.06);}var tgt=d<CELL*MAG_R?{x:tx,y:ty}:{x:rawP.x,y:rawP.y};magCur.x+=(tgt.x-magCur.x)*MAG_E;magCur.y+=(tgt.y-magCur.y)*MAG_E;}
  drawOverlay();magRaf=requestAnimationFrame(magLoop);
}

gc.addEventListener('mouseenter',function(){magActive=true;if(magRaf)cancelAnimationFrame(magRaf);magLoop();});
gc.addEventListener('mouseleave',function(){magActive=false;octx.clearRect(0,0,ov.width,ov.height);});
gc.addEventListener('mousemove',function(e){
  if(ghostState.active){ghostMoveTo(e.clientX,e.clientY);}var p=cpos(e.clientX,e.clientY);rawP={x:p.x,y:p.y};if(!magActive)magCur={x:p.x,y:p.y};hoverCell=getCell(e.clientX,e.clientY);});
gc.addEventListener('click',function(e){unlockAudio();ctxJustOpened=false;
  if(ghostState.active){ghostMoveTo(e.clientX,e.clientY);return;}if(ctxMenu.className==='show'){hideCtxMenu();return;}placeBlock(getCell(e.clientX,e.clientY));});
gc.addEventListener('contextmenu',function(e){e.preventDefault();var cell=getCell(e.clientX,e.clientY);if(cell&&appGrid[cell.c+','+cell.r])showCtxMenu(cell.c+','+cell.r,e.clientX,e.clientY);});

gc.addEventListener('touchstart',function(e){
  unlockAudio();
  if(e.touches.length===2){var t0=e.touches[0],t1=e.touches[1];pinchD=Math.sqrt(Math.pow(t0.clientX-t1.clientX,2)+Math.pow(t0.clientY-t1.clientY,2));return;}
  e.preventDefault();
  // ctxMenu表示中は閉じるだけで他の処理は一切しない
  if(ctxMenu.className==='show'){hideCtxMenu();touchSt=null;return;}
  var t=e.touches[0];
  touchSt={x:t.clientX,y:t.clientY,time:Date.now()};
  var p=cpos(t.clientX,t.clientY);rawP={x:p.x,y:p.y};magCur={x:p.x,y:p.y};
  hoverCell=getCell(t.clientX,t.clientY);
  magActive=true;if(magRaf)cancelAnimationFrame(magRaf);magLoop();
  var capCell=getCell(t.clientX,t.clientY);
  var capX=t.clientX,capY=t.clientY;
  longPressTimer=setTimeout(function(){
    if(!capCell)return;
    var key=capCell.c+','+capCell.r;
    if(appGrid[key]){
      dragMoveKey=key;dragMoveOrigin={x:capX,y:capY};dragMoveMode=false;
      ctxJustOpened=true;
      showCtxMenu(key,capX,capY);
      longPressSuccess(key);
    } else if(curTool==='draw'){
      stampMode=true;stampLastCell=null;
      stampSuccess(capCell);
    }
    longPressTimer=null;
  },LONG_PRESS_MS);
},{passive:false});

gc.addEventListener('touchmove',function(e){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  if(ghostState.active&&e.touches.length===1){e.preventDefault();var gt=e.touches[0];ghostMoveTo(gt.clientX,gt.clientY);return;}
  // ゴーストモード: タッチ移動でゴースト追従
  if(ghostState.active&&e.touches.length===1){
    e.preventDefault();
    var t=e.touches[0];
    ghostMoveTo(t.clientX,t.clientY);
    return;
  }
  if(stampMode&&e.touches.length===1&&curTool==='draw'){
    e.preventDefault();
    var st=e.touches[0];
    var sc=getCell(st.clientX,st.clientY);
    if(sc){var sk=sc.c+','+sc.r;if(!stampLastCell||(stampLastCell.c!==sc.c||stampLastCell.r!==sc.r)){stampLastCell=sc;placeBlock(sc);}}
    return;
  }
  if(dragMoveKey&&e.touches.length===1){
    var mt=e.touches[0];
    var mdx=mt.clientX-(dragMoveOrigin?dragMoveOrigin.x:mt.clientX);
    var mdy=mt.clientY-(dragMoveOrigin?dragMoveOrigin.y:mt.clientY);
    if(!dragMoveMode&&mdx*mdx+mdy*mdy>200){dragMoveMode=true;hideCtxMenu();}
    if(dragMoveMode){
      e.preventDefault();
      var mc=getCell(mt.clientX,mt.clientY);
      if(mc){
        var srcKey=dragMoveKey;var srcCell=appGrid[srcKey];
        if(!srcCell){dragMoveMode=false;dragMoveKey=null;return;}
        var srcParts=srcKey.split(',');var srcC=parseInt(srcParts[0]),srcR=parseInt(srcParts[1]);
        var dc=mc.c-srcC,dr=mc.r-srcR;
        if(dc!==0||dr!==0){
          var gid=srcCell.groupId;var moveCells=[];
          if(gid&&groupMap[gid]){groupMap[gid].cells.forEach(function(pos){moveCells.push({c:pos.c,r:pos.r});});}
          else{moveCells.push({c:srcC,r:srcR});}
          var srcKeys={};moveCells.forEach(function(p){srcKeys[p.c+','+p.r]=true;});
          var canMove=true;
          moveCells.forEach(function(p){var dk=(p.c+dc)+','+(p.r+dr);if(!srcKeys[dk]&&appGrid[dk]){canMove=false;}if(p.c+dc<0||p.c+dc>=COLS||p.r+dr<0||p.r+dr>=ROWS){canMove=false;}});
          if(canMove){
            pushUndo();
            moveCells.forEach(function(p){delete appGrid[p.c+','+p.r];});
            if(gid&&groupMap[gid])delete groupMap[gid];
            moveCells.forEach(function(p){var dk=(p.c+dc)+','+(p.r+dr);appGrid[dk]={id:srcCell.id,dir:srcCell.dir,groupId:null};});
            moveCells.forEach(function(p){recomputeGroups(p.c+dc,p.r+dr);});
            dragMoveKey=(srcC+dc)+','+(srcR+dr);dragMoveOrigin={x:mt.clientX,y:mt.clientY};render();
          }
        }
      }
      return;
    }
  }
  if(e.touches.length===2){
    e.preventDefault();
    var t0=e.touches[0],t1=e.touches[1];
    var d=Math.sqrt(Math.pow(t0.clientX-t1.clientX,2)+Math.pow(t0.clientY-t1.clientY,2));
    if(pinchD){if(d/pinchD>1.12){CELL=Math.min(100,CELL+3);pinchD=d;render();}else if(d/pinchD<0.88){CELL=Math.max(24,CELL-3);pinchD=d;render();}}
    return;
  }
  if(e.touches.length===1){
    var t=e.touches[0];var p2=cpos(t.clientX,t.clientY);rawP={x:p2.x,y:p2.y};
    hoverCell=getCell(t.clientX,t.clientY);
  }
},{passive:false});

gc.addEventListener('touchend',function(e){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  if(!touchSt){magActive=false;return;}
  // ゴーストモード: touchendでは位置更新のみ（確定はボタンで）
  if(ghostState.active&&e.changedTouches.length===1){
    var gt2=e.changedTouches[0];
    ghostMoveTo(gt2.clientX,gt2.clientY);
    touchSt=null;magActive=false;
    return;
  }
  if(stampMode){
    stampMode=false;stampLastCell=null;
    var sw=document.getElementById('canvas-wrap');if(sw)sw.style.outline='';
    pinchD=null;touchSt=null;magActive=false;return;
  }
  if(dragMoveMode){
    dragMoveMode=false;dragMoveKey=null;dragMoveOrigin=null;ctxJustOpened=false;
    pinchD=null;touchSt=null;magActive=false;return;
  }
  var wasCtxOrDrag=(dragMoveKey!==null);
  if(dragMoveKey){dragMoveKey=null;dragMoveOrigin=null;}
  if(ctxJustOpened){ctxJustOpened=false;pinchD=null;touchSt=null;magActive=false;return;}
  if(ctxMenu.className==='show'){hideCtxMenu();pinchD=null;touchSt=null;magActive=false;return;}
  if(wasCtxOrDrag){pinchD=null;touchSt=null;magActive=false;return;}
  if(touchSt&&e.changedTouches.length===1){
    var t=e.changedTouches[0];var dx=t.clientX-touchSt.x,dy=t.clientY-touchSt.y;
    var elapsed=Date.now()-touchSt.time;
    if(dx*dx+dy*dy<100&&elapsed<LONG_PRESS_MS){placeBlock(getCell(t.clientX,t.clientY));}
  }
  pinchD=null;touchSt=null;magActive=false;
},{passive:true});

gc.addEventListener('touchcancel',function(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  if(stampMode){stampMode=false;stampLastCell=null;var sw=document.getElementById('canvas-wrap');if(sw)sw.style.outline='';}
  dragMoveMode=false;dragMoveKey=null;dragMoveOrigin=null;ctxJustOpened=false;
  pinchD=null;touchSt=null;magActive=false;
},{passive:true});

document.addEventListener('touchstart',function(e){

var MAP_KEY='mc_city_maps';
function getMaps(){
  try{return JSON.parse(localStorage.getItem(MAP_KEY)||'[]');}
  catch(ex){return[];}
}
function saveMaps(arr){
  try{localStorage.setItem(MAP_KEY,JSON.stringify(arr));}
  catch(ex){window.alert('保存失敗: ストレージ容量不足の可能性があります');}
}

function renderFieldSlots(){
  var list=document.getElementById('field-slot-list');
  if(!list)return;
  var maps=getMaps();
  list.innerHTML='';
  if(!maps.length){
    list.innerHTML='<div style="font-size:12px;color:var(--text-dim);text-align:center;padding:12px 0;">'+(t('noFields')||'保存済みなし')+'</div>';
    return;
  }
  var rows=[];
  maps.slice().reverse().forEach(function(m,ri){
    var i=maps.length-1-ri;
    var d=new Date(m.date);
    var ds=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid #1e3a5a;border-radius:10px;margin-bottom:6px;';
    var nameEl=document.createElement('div');
    nameEl.style.cssText='flex:1;color:#e0e8f0;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    nameEl.textContent=m.name+' ('+ds+')';
    var lb=document.createElement('button');
    lb.type='button';
    lb.textContent=t('loadField')||'読込';
    lb.setAttribute('onclick','fieldLoad('+i+')');
    lb.style.cssText='background:rgba(59,158,255,0.2);border:1.5px solid #3b9eff;color:#7ab8ff;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;padding:6px 12px;white-space:nowrap;touch-action:manipulation;min-height:36px;';
    var db=document.createElement('button');
    db.type='button';
    db.textContent='🗑';
    db.setAttribute('onclick','fieldDel('+i+')');
    db.style.cssText='background:rgba(248,113,113,0.15);border:1.5px solid #7f1d1d;color:#f87171;font-size:14px;cursor:pointer;border-radius:8px;padding:6px 10px;touch-action:manipulation;min-height:36px;';
    row.appendChild(nameEl);row.appendChild(lb);row.appendChild(db);
    list.appendChild(row);
  });
}

    pushUndo();
    Object.keys(appGrid).forEach(function(k){delete appGrid[k];});
    Object.keys(groupMap).forEach(function(k){delete groupMap[k];});
    render();closeSettings();
  }
};

// ===== SAVE/LOAD SYSTEM =====
function saveMap(mapName){
  if(!mapName||!mapName.trim()){window.alert('フィールド名を入力してください');return false;}
  try{
    var slots=JSON.parse(localStorage.getItem('mcCityPlannerSlots')||'{}');
    slots['map_'+Date.now()]={
      name:mapName,timestamp:new Date().toISOString(),
      appGrid:JSON.parse(JSON.stringify(appGrid)),
      groupMap:JSON.parse(JSON.stringify(groupMap)),
      nextGroupId:nextGroupId,curTool:curTool,selBlock:selBlock
    };
    localStorage.setItem('mcCityPlannerSlots',JSON.stringify(slots));
    window.alert(mapName+'を保存しました！');
    return true;
  }catch(e){window.alert('保存失敗: '+e.message);return false;}
}
function loadMap(slotKey){
  try{
    var slots=JSON.parse(localStorage.getItem('mcCityPlannerSlots')||'{}');
    var m=slots[slotKey];
    if(!m){window.alert('マップが見つかりません');return false;}
    if(!window.confirm((m.name||'このマップ')+'を読み込みますか？現在のマップは失われます。'))return false;
    pushUndo();
    appGrid=m.appGrid||{};groupMap=m.groupMap||{};
    nextGroupId=m.nextGroupId||1;curTool=m.curTool||'draw';selBlock=m.selBlock||'house';
    undoStack=[];redoStack=[];
    updateToolUI();buildSheet();render();
    window.alert('読み込みました: '+(m.name||'マップ'));
    return true;
  }catch(e){window.alert('読み込み失敗: '+e.message);return false;}
}
function deleteMap(slotKey){
  try{
    if(!window.confirm('削除しますか？'))return false;
    var slots=JSON.parse(localStorage.getItem('mcCityPlannerSlots')||'{}');
    delete slots[slotKey];
    localStorage.setItem('mcCityPlannerSlots',JSON.stringify(slots));
    updateSaveUI();
    return true;
  }catch(e){window.alert('削除失敗: '+e.message);return false;}
}
function updateSaveUI(){
  var el=document.getElementById('field-slot-list');
  if(!el)return;
  try{
    var slots=JSON.parse(localStorage.getItem('mcCityPlannerSlots')||'{}');
    var keys=Object.keys(slots);
    el.innerHTML='';
    if(!keys.length){
      el.innerHTML='<div class="map-slot-empty">保存済みなし</div>';
      return;
    }
    keys.slice().reverse().forEach(function(k){
      var m=slots[k];if(!m)return;
      var ds=new Date(m.timestamp).toLocaleString('ja-JP');
      var row=document.createElement('div');row.className='map-slot';
      var info=document.createElement('div');info.className='map-slot-info';
      var nm=document.createElement('div');nm.className='map-slot-name';nm.textContent=m.name||'Unknown';
      var dt=document.createElement('div');dt.className='map-slot-date';dt.textContent=ds;
      info.appendChild(nm);info.appendChild(dt);
      var lb=document.createElement('button');lb.className='map-slot-btn';lb.type='button';
      lb.textContent='読込';lb.setAttribute('onclick','mcLoadMap("'+k+'")');
      var db=document.createElement('button');db.className='map-slot-del';db.type='button';
      db.textContent='🗑';db.setAttribute('onclick','mcDeleteMap("'+k+'")');
      row.appendChild(info);row.appendChild(lb);row.appendChild(db);
      el.appendChild(row);
    });
  }catch(e){console.error('updateSaveUI:',e);}
}

// ===== ZONE/UPDATE JSON APPLICATORS =====
function applyZoneJSON(data){
  pushUndo();
  var zones = data.zones||[];
  var roads = data.roads||[];
  var features = data.features||[];

  // --- ZONES ---
  zones.forEach(function(zone){
    for(var dx=0;dx<(zone.w||1);dx++){
      for(var dy=0;dy<(zone.h||1);dy++){
        var x=zone.x+dx, y=zone.y+dy;
        if(x<0||x>=COLS||y<0||y>=ROWS)continue;
        var block='house';
        if(zone.type==='commercial') block=Math.random()<0.6?'shop':'bank';
        else if(zone.type==='industrial') block=Math.random()<0.7?'factory':'warehouse';
        else if(zone.type==='leisure') block=Math.random()<0.6?'park':'forest';
        else if(zone.type==='nature') block=Math.random()<0.5?'water':'forest';
        else if(zone.type==='residential'){
          if(zone.density==='high') block=Math.random()<0.5?'apartment':'tower';
          else if(zone.density==='low') block='house';
          else block=Math.random()<0.4?'apartment':'house';
        }
        if(zone.density==='low'&&Math.random()<0.35)continue;
        if(appGrid[x+','+y])continue; // 既存ブロックはスキップ
        appGrid[x+','+y]={id:block,dir:'none',groupId:null};
      }
    }
  });

  // --- ROADS ---
  roads.forEach(function(r){
    var x1=r.from[0],y1=r.from[1],x2=r.to[0],y2=r.to[1];
    if(x1===x2){
      for(var y=Math.min(y1,y2);y<=Math.max(y1,y2);y++){
        if(y<0||y>=ROWS)continue;
        appGrid[x1+','+y]={id:'road',dir:'none',groupId:null};
      }
    } else {
      for(var x=Math.min(x1,x2);x<=Math.max(x1,x2);x++){
        if(x<0||x>=COLS)continue;
        appGrid[x+','+y1]={id:'road',dir:'none',groupId:null};
      }
    }
  });

  // --- FEATURES ---
  features.forEach(function(f){
    for(var dx=0;dx<(f.w||1);dx++){
      for(var dy=0;dy<(f.h||1);dy++){
        var x=f.x+dx, y=f.y+dy;
        if(x<0||x>=COLS||y<0||y>=ROWS)continue;
        appGrid[x+','+y]={id:f.type,dir:'none',groupId:null};
      }
    }
  });

  // グループ再計算
  Object.keys(appGrid).forEach(function(k){
    var p=k.split(',');
    recomputeGroups(parseInt(p[0]),parseInt(p[1]));
  });
  render();
}

// ④ 差分修正（部分更新）
function applyUpdateJSON(data){
  pushUndo();
  var updates=data.update||data.blocks||[];
  updates.forEach(function(u){
    for(var dx=0;dx<(u.w||1);dx++){
      for(var dy=0;dy<(u.h||1);dy++){
        var x=(u.x||u.c)+dx, y=(u.y||u.r)+dy;
        if(x<0||x>=COLS||y<0||y>=ROWS)continue;
        if(u.remove){
          var k=x+','+y;
          var gid=appGrid[k]&&appGrid[k].groupId;
          if(gid&&groupMap[gid]){
            groupMap[gid].cells.forEach(function(pos){delete appGrid[pos.c+','+pos.r];});
            delete groupMap[gid];
          } else {delete appGrid[k];}
        } else {
          appGrid[x+','+y]={id:u.type||u.id,dir:'none',groupId:null};
        }
      }
    }
  });
  Object.keys(appGrid).forEach(function(k){
    var p=k.split(',');recomputeGroups(parseInt(p[0]),parseInt(p[1]));
  });
  render();
}

render();applyLang();
window._mcApp={
  getMaps:getMaps,
  getGrid:function(){return appGrid;},
  applyZoneJSON:applyZoneJSON,
  applyUpdateJSON:applyUpdateJSON,
  applyAiBlocks:function(blocks){
    if(!blocks||!blocks.length)return;
    pushUndo();
    blocks.forEach(function(b){
      if(b.c<0||b.c>=COLS||b.r<0||b.r>=ROWS)return;
      var k=b.c+','+b.r;
      if(appGrid[k])return;
      appGrid[k]={id:b.id,dir:'none',groupId:null};
    });
    blocks.forEach(function(b){
      if(b.c>=0&&b.c<COLS&&b.r>=0&&b.r<ROWS)recomputeGroups(b.c,b.r);
    });
    render();
  },
  saveMap:saveMap,
  loadMap:loadMap,
  deleteMap:deleteMap,
  updateSaveUI:updateSaveUI,
  renderFieldSlots:renderFieldSlots,
  doLoad:function(m){
    pushUndo();
    appGrid=JSON.parse(JSON.stringify(m.grid||m.appGrid||{}));
    groupMap=JSON.parse(JSON.stringify(m.groups||m.groupMap||{}));
    nextGroupId=m.nextGid||m.nextGroupId||1;
    CELL=m.cell||57;
    render();closeSettings();
    var cw=document.getElementById('canvas-wrap');
    if(cw){cw.scrollLeft=0;cw.scrollTop=0;}
  },
  ghostRotate:ghostRotate,
  ghostConfirm:ghostConfirm,
  ghostCancel:ghostCancel,
  clearMap:function(){
    if(window.confirm(t('clearConfirm')||'マップをクリアしますか？')){
      pushUndo();
      Object.keys(appGrid).forEach(function(k){delete appGrid[k];});
      Object.keys(groupMap).forEach(function(k){delete groupMap[k];});
      render();closeSettings();
    }
  }
};
return {};
})();

// グローバル関数（onclick属性から呼ぶ）
function mcLoadMap(k){if(window._mcApp)window._mcApp.loadMap(k);}

(function(){
