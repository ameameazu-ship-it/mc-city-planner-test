<script>
// ===== AI CITY PLANNER =====
function toggleAiPanel(){var p=document.getElementById('ai-panel');if(!p)return;p.className=p.className==='open'?'':'open';}
document.addEventListener('DOMContentLoaded',function(){
  var t=document.getElementById('ai-toggle');if(t)t.onclick=function(){toggleAiPanel();};
  var inp=document.getElementById('ai-input');
  if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();}});
});
function aiAddMsg(text,role,isError){
  var log=document.getElementById('ai-chat-log');if(!log)return null;
  var div=document.createElement('div');
  div.className=role==='user'?'ai-msg-user':('ai-msg-ai'+(isError?' error':''));
  div.textContent=text;log.appendChild(div);log.scrollTop=log.scrollHeight;return div;
}
function aiSend(){
  var inp=document.getElementById('ai-input');
  var sendBtn=document.getElementById('ai-send');
  if(!inp||!sendBtn)return;
  var userText=inp.value.trim();if(!userText)return;
  var ANTHROPIC_API_KEY='YOUR_API_KEY_HERE';
  if(!ANTHROPIC_API_KEY||ANTHROPIC_API_KEY==='YOUR_API_KEY_HERE'){
    aiAddMsg('API\u30ad\u30fc\u304c\u672a\u8a2d\u5b9a\u3067\u3059\u3002HTML\u306e YOUR_API_KEY_HERE \u3092\u304a\u4f7f\u3044\u306e\u30ad\u30fc\u306b\u7f6e\u304d\u63db\u3048\u3066\u304f\u3060\u3055\u3044\u3002','ai',true);return;
  }
  inp.value='';sendBtn.disabled=true;
  aiAddMsg(userText,'user');
  var thinkingDiv=aiAddMsg('\u8003\u3048\u4e2d\u2026','ai');
  var blockIDs='house,apartment,castle,church,school,hospital,tower,police,fire,shop,hotel,bank,factory,stadium,library,museum,landmark,road,bridge,station,airport,port,water,forest,park,mountain,flower,volcano,farm,fountain';
  var sp='\u3042\u306a\u305f\u306fMinecraft\u98a8\u90fd\u5e02\u8a2d\u8a08AI\u3067\u3059\u3002\u30e6\u30fc\u30b6\u30fc\u306e\u8981\u671b\u3092\u805e\u3044\u3066\u30d5\u30a3\u30fc\u30eb\u30c9(40\u5217x60\u884c)\u306e\u914d\u7f6e\u3092JSON\u3067\u8fd4\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\u5168\u4f53\u751f\u6210: {"message":"\u8aac\u660e","zones":[{"type":"residential","x":2,"y":2,"w":10,"h":8,"density":"medium"}],"roads":[{"from":[0,10],"to":[39,10]}],"features":[{"type":"park","x":18,"y":12,"w":4,"h":4}]}\n\u90e8\u5206\u4fee\u6b63: {"message":"\u8aac\u660e","update":[{"type":"water","x":5,"y":5,"w":3,"h":2}]}\nzone.type: residential/commercial/industrial/leisure/nature\nzone.density: low/medium/high\n\u4f7f\u7528\u53efID: '+blockIDs+'\n\u30eb\u30fc\u30eb: JSON\u306e\u307f\u8fd4\u7b54\u3001\u5ea7\u6a19\u306f0-39\u30fb0-59\u306e\u7bc4\u56f2\u5185\u3001\u9053\u8def\u3067\u533a\u753b\u6574\u7406';
  var grid=window._mcApp?window._mcApp.getGrid():{};
  var cells=[];
  Object.keys(grid).forEach(function(k){var c=grid[k],p=k.split(',');cells.push({id:c.id,x:parseInt(p[0]),y:parseInt(p[1])});});
  var gs=JSON.stringify({cols:40,rows:60,blocks:cells.slice(0,300)});
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':ANTHROPIC_API_KEY},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sp+'\n\n\u73fe\u5728\u306e\u30b0\u30ea\u30c3\u30c9: '+gs,messages:[{role:'user',content:userText}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    sendBtn.disabled=false;if(thinkingDiv)thinkingDiv.remove();
    if(data.error){aiAddMsg('\u30a8\u30e9\u30fc: '+data.error.message,'ai',true);return;}
    var raw=(data.content&&data.content[0]&&data.content[0].text)||'';
    try{
      var json=JSON.parse(raw.replace(/```json|```/g,'').trim());
      var msg=json.message||'\u5b8c\u4e86\u3057\u307e\u3057\u305f';
      var app=window._mcApp;
      if(!app){aiAddMsg('\u30a2\u30d7\u30ea\u30a8\u30e9\u30fc','ai',true);return;}
      if(json.zones||json.roads||json.features){
        app.applyZoneJSON(json);
        aiAddMsg(msg+' (\u30be\u30fc\u30f3\u5f62\u5f0f)','ai');
      } else if(json.update){
        app.applyUpdateJSON(json);
        aiAddMsg(msg+' (\u5dee\u5206'+json.update.length+'\u500b)','ai');
      } else if(json.blocks){
        app.applyAiBlocks(json.blocks);
        aiAddMsg(msg+' ('+json.blocks.length+'\u30d6\u30ed\u30c3\u30af)','ai');
      } else {
        aiAddMsg('\u4e0d\u660e\u306a\u5f62\u5f0f\u3067\u3059\u3002\u518d\u5ea6\u8a66\u3057\u3066\u304f\u3060\u3055\u3044\u3002','ai',true);
      }
    }catch(ex){aiAddMsg('JSON\u89e3\u6790\u5931\u6557: '+ex.message,'ai',true);}
  })
  .catch(function(err){sendBtn.disabled=false;if(thinkingDiv)thinkingDiv.remove();aiAddMsg('\u901a\u4fe1\u30a8\u30e9\u30fc: '+err.message,'ai',true);});
}
